name: CI Workflow

on: [push]

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: login to Dockerhub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | Docker Login-u "${{ secrets.DOCKER_USERNAME }}" --password stdin

      - name: Build Image
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/ci-pratice "${{ github.run_number }}" .

      - name: push to Dockerhub
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/ci-pratice "${{ github.run_number }}"
