name: CI Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}"/dockerpratice:${{ github.run_number }} .
      
      - name: Push to DockerHub
        run: docker push "${{ secrets.DOCKER_USERNAME }}"/dockerpratice:${{ github.run_number }}
